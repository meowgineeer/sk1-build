name: Build sk1 Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-python
          mingw-w64-x86_64-python-pip
          mingw-w64-x86_64-python-setuptools
          mingw-w64-x86_64-python-wheel
          mingw-w64-x86_64-python-cairo
          mingw-w64-x86_64-python-wxpython
          mingw-w64-x86_64-python-pillow
          mingw-w64-x86_64-python-reportlab
          mingw-w64-x86_64-cairo
          mingw-w64-x86_64-pango
          mingw-w64-x86_64-lcms2
          mingw-w64-x86_64-imagemagick
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkgconf
          zip

    - name: Install System Dependencies
      run: |
        pip install pyinstaller

    - name: Install Application
      run: |
        python setup.py install

    - name: Package to EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "sk1" --collect-all sk1 --collect-all uc2 src/script/sk1.tmpl

    - name: Zip Output
      run: |
        zip -r sk1-windows.zip dist/sk1

    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sk1-windows-app
        path: sk1-windows.zip
