name: Build sk1 Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install vcpkg dependencies
      run: |
        vcpkg install cairo pango lcms imagemagick --triplet x64-windows

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel pyinstaller wxPython pillow reportlab

    - name: Install Application
      run: |
        python setup.py install

    - name: Package to EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "sk1" --collect-all sk1 --collect-all uc2 src/script/sk1.tmpl

    - name: Zip Output
      run: |
        Compress-Archive -Path dist\sk1 -DestinationPath sk1-windows.zip

    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sk1-windows-app
        path: sk1-windows.zip
